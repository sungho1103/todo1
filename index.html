<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>해치워</title>
<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
  import { getAuth, onAuthStateChanged, signInWithPopup, signInWithRedirect, getRedirectResult, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDUZ2x-lbrOjquw8Op6O-ipDie8JTyaJak",
    authDomain: "myportfolio-admin-afc4c.firebaseapp.com",
    projectId: "myportfolio-admin-afc4c",
    storageBucket: "myportfolio-admin-afc4c.firebasestorage.app",
    messagingSenderId: "778200517678",
    appId: "1:778200517678:web:e3fe850c2957133d7b23bf"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  let unsubscribeTasks = null;

  // 전역 DB 함수 노출
  window._addDoc = addDoc;
  window._updateDoc = updateDoc;
  window._deleteDoc = deleteDoc;
  window._firestoreReady = false;

  // 인증 상태 변화 감지
  onAuthStateChanged(auth, (user) => {
    if (user) {
      // 로그인 상태 → 앱 표시
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app-screen').style.display = 'flex';
      document.getElementById('user-name').textContent = user.displayName || user.email;
      const avatar = user.photoURL;
      if (avatar) {
        document.getElementById('user-avatar').src = avatar;
        document.getElementById('user-avatar').style.display = 'block';
      }

      // 사용자별 tasks 구독
      if (unsubscribeTasks) unsubscribeTasks();
      const userCol = collection(db, 'users', user.uid, 'tasks');
      const q = query(userCol, orderBy('createdAt', 'desc'));
      unsubscribeTasks = onSnapshot(q, (snapshot) => {
        window._tasks = snapshot.docs.map(d => ({ ...d.data(), _docId: d.id }));
        if (window._renderFromFirestore) window._renderFromFirestore();
      });
      window._col = () => collection(db, 'users', user.uid, 'tasks');
      window._doc = (id) => doc(db, 'users', user.uid, 'tasks', id);
      window._firestoreReady = true;
    } else {
      // 로그아웃 상태 → 로그인 화면
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('app-screen').style.display = 'none';
      if (unsubscribeTasks) { unsubscribeTasks(); unsubscribeTasks = null; }
      window._firestoreReady = false;
      window._tasks = [];
    }
  });

  // 로그인/로그아웃 함수 노출
  // 인앱브라우저(카카오톡 등) 대응: disallowed_useragent 회피를 위해 redirect 사용
  const _provider = new GoogleAuthProvider();
  window._loginGoogle = () => signInWithRedirect(auth, _provider);

  // 리디렉션 결과 처리 (페이지 복귀 시 자동 로그인 완료)
  getRedirectResult(auth).catch(err => {
    if (err && err.code !== 'auth/no-auth-event') {
      console.error('구글 로그인 오류:', err.message);
      alert('구글 로그인 실패: ' + err.message);
    }
  });
  window._loginEmail = (email, pw) => signInWithEmailAndPassword(auth, email, pw);
  window._signupEmail = (email, pw) => createUserWithEmailAndPassword(auth, email, pw);
  window._logout = () => signOut(auth);
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #202124; --surface: #292a2d; --surface2: #35363a;
    --accent: #8ab4f8; --accent-hover: #aecbfa;
    --text: #e8eaed; --text-muted: #9aa0a6; --text-done: #5f6368;
    --divider: #3c4043; --danger: #f28b82; --check-color: #81c995;
    --radius: 8px; --shadow: 0 1px 3px rgba(0,0,0,.4);
  }
  body { font-family: 'Google Sans',Roboto,Arial,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; font-size:var(--fs, 1rem); }

  /* ── Header ── */
  header { background:var(--surface); border-bottom:1px solid var(--divider); padding:0 28px; height:64px; display:flex; align-items:center; gap:14px; position:sticky; top:0; z-index:100; box-shadow:var(--shadow); }
  header h1 { font-size:1.45rem; font-weight:500; color:var(--text); letter-spacing:.3px; flex:1; }
  .font-ctrl { display:flex; align-items:center; gap:6px; margin-left:auto; }
  .font-ctrl button { background:var(--surface2); border:1px solid var(--divider); color:var(--text-muted); width:28px; height:28px; border-radius:6px; cursor:pointer; font-size:1rem; line-height:1; display:flex; align-items:center; justify-content:center; transition:background .15s,color .15s; }
  .font-ctrl button:hover { background:var(--accent); color:#202124; border-color:var(--accent); }
  .font-ctrl span { font-size:.8rem; color:var(--text-muted); min-width:28px; text-align:center; }

  /* ── 히스토리 버튼 ── */
  .history-btn { background:var(--surface2); border:1px solid var(--divider); color:var(--text-muted); padding:5px 14px; border-radius:6px; cursor:pointer; font-size:.85rem; font-family:inherit; margin-left:16px; transition:background .15s,color .15s; }
  .history-btn:hover { background:var(--accent); color:#202124; border-color:var(--accent); }

  /* ── 히스토리 모달 ── */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--surface); border-radius:12px; width:560px; max-width:92vw; max-height:80vh; display:flex; flex-direction:column; box-shadow:0 8px 32px rgba(0,0,0,.5); overflow:hidden; }
  .modal-header { padding:18px 22px 16px; border-bottom:1px solid var(--divider); display:flex; align-items:center; justify-content:space-between; }
  .modal-header h2 { font-size:1.05em; font-weight:600; color:var(--text); }
  .modal-close { background:none; border:none; color:var(--text-muted); font-size:1.4rem; cursor:pointer; padding:2px 6px; border-radius:4px; line-height:1; }
  .modal-close:hover { color:var(--text); background:var(--surface2); }
  .modal-body { overflow-y:auto; padding:12px 0 16px; flex:1; }
  .history-empty { text-align:center; color:var(--text-muted); font-size:.9em; padding:40px 20px; }

  /* 날짜 그룹 */
  .hist-group { margin-bottom:4px; }
  .hist-date { padding:8px 22px 6px; font-size:.8em; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:.6px; border-bottom:1px solid var(--divider); }
  .hist-item { display:flex; align-items:flex-start; padding:10px 22px; gap:12px; }
  .hist-item:hover { background:var(--surface2); }
  .hist-check { flex-shrink:0; width:20px; height:20px; border-radius:50%; background:var(--check-color); display:flex; align-items:center; justify-content:center; margin-top:2px; }
  .hist-body { flex:1; min-width:0; }
  .hist-title { font-size:.95em; color:var(--text-done); text-decoration:line-through; text-decoration-color:var(--text-done); }
  .hist-note { font-size:.83em; color:var(--text-muted); margin-top:3px; }
  .hist-time { font-size:.78em; color:var(--text-muted); margin-top:2px; }

  /* ── Layout ── */
  main { flex:1; padding:32px; display:grid; grid-template-columns:1fr 1fr; gap:32px; max-width:1400px; margin:0 auto; width:100%; }
  @media(max-width:768px){ main{ grid-template-columns:1fr; padding:20px; gap:20px; } }

  /* ── Column ── */
  .col { background:var(--surface); border-radius:var(--radius); display:flex; flex-direction:column; min-height:500px; box-shadow:var(--shadow); overflow:hidden; }
  .col-header { padding:18px 22px 16px; border-bottom:1px solid var(--divider); display:flex; align-items:center; gap:10px; }
  .col-header h2 { font-size:1.05em; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:.8px; flex:1; }
  .count-badge { font-size:.88em; background:var(--surface2); color:var(--text-muted); border-radius:12px; padding:3px 11px; font-weight:500; }

  /* ── Add bar ── */
  .add-bar { display:flex; align-items:center; padding:14px 20px; border-bottom:1px solid var(--divider); gap:12px; }
  .add-bar input { flex:1; background:transparent; border:none; outline:none; color:var(--text); font-size:1em; font-family:inherit; }
  .add-bar input::placeholder { color:var(--text-muted); }
  .add-bar button { background:none; border:none; cursor:pointer; padding:6px; color:var(--accent); display:flex; align-items:center; border-radius:50%; transition:background .15s; }
  .add-bar button:hover { background:rgba(138,180,248,.12); }

  /* ── Task list ── */
  .task-list { flex:1; overflow-y:auto; padding:8px 0; }
  .task-list:empty::after { content:attr(data-empty); display:block; text-align:center; color:var(--text-muted); font-size:.95em; padding:50px 20px; }

  /* ── Task item ── */
  .task-item { display:flex; align-items:flex-start; padding:14px 18px 14px 16px; gap:14px; cursor:default; position:relative; transition:background .12s; user-select:none; }
  .task-item:hover { background:var(--surface2); }
  .task-item.dragging { opacity:.4; }
  .task-item.drag-over { border-top:2px solid var(--accent); }

  /* drag handle */
  .drag-handle { flex-shrink:0; width:22px; height:22px; margin-top:2px; cursor:grab; color:var(--divider); display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .15s; }
  .task-item:hover .drag-handle { opacity:1; }

  /* checkbox */
  .task-check { flex-shrink:0; width:24px; height:24px; border-radius:50%; border:2px solid var(--text-muted); cursor:pointer; display:flex; align-items:center; justify-content:center; margin-top:2px; transition:border-color .15s,background .15s; background:transparent; }
  .task-check:hover { border-color:var(--check-color); }
  .task-item.done .task-check { border-color:var(--check-color); background:var(--check-color); }
  .task-check svg { display:none; }
  .task-item.done .task-check svg { display:block; }

  /* text */
  .task-body { flex:1; min-width:0; }
  .task-title { font-size:1em; color:var(--text); word-break:break-word; line-height:1.55; }
  .task-item.done .task-title { color:var(--text-done); text-decoration:line-through; text-decoration-color:var(--text-done); }
  .task-note { font-size:.88em; color:var(--text-muted); margin-top:4px; white-space:pre-wrap; word-break:break-word; }
  .task-due { font-size:.85em; color:var(--text-muted); margin-top:5px; display:flex; align-items:center; gap:5px; }
  .task-due.overdue { color:#f28b82; }

  /* edit mode */
  .task-edit-title { width:100%; background:var(--surface2); border:1px solid var(--accent); border-radius:4px; color:var(--text); font-size:1em; font-family:inherit; padding:5px 8px; outline:none; resize:none; }
  .task-edit-note { width:100%; margin-top:6px; background:var(--surface2); border:1px solid var(--divider); border-radius:4px; color:var(--text-muted); font-size:.88em; font-family:inherit; padding:5px 8px; outline:none; resize:none; min-height:48px; }
  .task-edit-due { margin-top:6px; background:var(--surface2); border:1px solid var(--divider); border-radius:4px; color:var(--text-muted); font-size:.88em; font-family:inherit; padding:5px 8px; outline:none; width:100%; }
  .edit-actions { display:flex; gap:8px; margin-top:8px; }
  .btn-save { background:var(--accent); color:#202124; border:none; border-radius:4px; font-size:.88em; font-weight:600; padding:6px 16px; cursor:pointer; font-family:inherit; transition:background .12s; }
  .btn-save:hover { background:var(--accent-hover); }
  .btn-cancel-edit { background:transparent; color:var(--text-muted); border:1px solid var(--divider); border-radius:4px; font-size:.88em; padding:6px 12px; cursor:pointer; font-family:inherit; }
  .btn-cancel-edit:hover { background:var(--surface2); }

  /* action buttons */
  .task-actions { display:flex; align-items:center; gap:4px; flex-shrink:0; opacity:0; transition:opacity .15s; }
  .task-item:hover .task-actions { opacity:1; }
  .task-actions button { background:none; border:none; cursor:pointer; padding:6px; color:var(--text-muted); border-radius:50%; display:flex; align-items:center; transition:background .12s,color .12s; }
  .task-actions button:hover { background:var(--surface2); color:var(--text); }
  .task-actions .btn-delete:hover { color:var(--danger); background:rgba(242,139,130,.1); }

  /* clear done */
  .clear-done-btn { margin:10px 18px 12px; background:none; border:1px solid var(--divider); color:var(--text-muted); font-family:inherit; font-size:.88em; padding:7px 16px; border-radius:16px; cursor:pointer; transition:background .12s,color .12s; align-self:flex-start; display:none; }
  .clear-done-btn:hover { background:rgba(242,139,130,.1); color:var(--danger); border-color:var(--danger); }
  .clear-done-btn.visible { display:inline-block; }

  /* ── 로그인 화면 ── */
  #login-screen { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:300; }
  .login-box { background:var(--surface); border-radius:16px; padding:48px 40px; width:380px; max-width:92vw; box-shadow:0 8px 32px rgba(0,0,0,.5); display:flex; flex-direction:column; align-items:center; gap:0; }
  .login-logo { width:52px; height:52px; margin-bottom:16px; }
  .login-box h1 { font-size:1.8rem; font-weight:700; color:var(--text); margin-bottom:6px; }
  .login-box p { font-size:.9rem; color:var(--text-muted); margin-bottom:32px; }
  .btn-google { width:100%; padding:12px; border-radius:8px; border:1px solid var(--divider); background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; transition:background .15s; margin-bottom:16px; }
  .btn-google:hover { background:#35363a; border-color:var(--accent); }
  .login-divider { width:100%; display:flex; align-items:center; gap:12px; margin-bottom:16px; }
  .login-divider::before,.login-divider::after { content:''; flex:1; height:1px; background:var(--divider); }
  .login-divider span { font-size:.8rem; color:var(--text-muted); }
  .login-input { width:100%; padding:11px 14px; border-radius:8px; border:1px solid var(--divider); background:var(--surface2); color:var(--text); font-size:.9rem; font-family:inherit; outline:none; margin-bottom:10px; }
  .login-input:focus { border-color:var(--accent); }
  .btn-email-login { width:100%; padding:12px; border-radius:8px; border:none; background:var(--accent); color:#202124; font-size:.95rem; font-weight:600; font-family:inherit; cursor:pointer; transition:background .15s; margin-bottom:10px; }
  .btn-email-login:hover { background:var(--accent-hover); }
  .login-switch { font-size:.82rem; color:var(--text-muted); cursor:pointer; text-align:center; }
  .login-switch span { color:var(--accent); text-decoration:underline; cursor:pointer; }
  .login-error { font-size:.82rem; color:var(--danger); text-align:center; min-height:18px; margin-top:-4px; margin-bottom:4px; }

  /* ── 헤더 유저 정보 ── */
  .user-info { display:flex; align-items:center; gap:8px; margin-left:16px; }
  .user-info img { width:28px; height:28px; border-radius:50%; display:none; }
  .user-info span { font-size:.82rem; color:var(--text-muted); max-width:140px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .btn-logout { background:none; border:1px solid var(--divider); color:var(--text-muted); font-size:.78rem; font-family:inherit; padding:4px 10px; border-radius:6px; cursor:pointer; transition:background .15s,color .15s; }
  .btn-logout:hover { background:rgba(242,139,130,.1); color:var(--danger); border-color:var(--danger); }

  /* 앱 화면 래퍼 */
  #app-screen { flex-direction:column; flex:1; display:none; }

  /* scrollbar */
  .task-list::-webkit-scrollbar { width:6px; }
  .task-list::-webkit-scrollbar-track { background:transparent; }
  .task-list::-webkit-scrollbar-thumb { background:var(--divider); border-radius:3px; }
  input[type="date"]::-webkit-calendar-picker-indicator { filter:invert(0.7); cursor:pointer; }
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen">
  <div class="login-box">
    <svg class="login-logo" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="11" fill="#8ab4f8"/>
      <path d="M7 12.5l3.5 3.5 6.5-7" stroke="#202124" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h1>해치워</h1>
    <p>오늘 할 일을 해치워버려요 💪</p>

    <button class="btn-google" id="btn-google">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Google로 로그인
    </button>

    <div class="login-divider"><span>또는 이메일로</span></div>

    <input class="login-input" type="email" id="login-email" placeholder="이메일">
    <input class="login-input" type="password" id="login-pw" placeholder="비밀번호">
    <div class="login-error" id="login-error"></div>
    <button class="btn-email-login" id="btn-email-action">로그인</button>
    <div class="login-switch" id="login-switch">계정이 없으신가요? <span id="switch-link">회원가입</span></div>
  </div>
</div>

<!-- 앱 화면 -->
<div id="app-screen">
<header>
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
    <circle cx="12" cy="12" r="11" fill="#8ab4f8"/>
    <path d="M7 12.5l3.5 3.5 6.5-7" stroke="#202124" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <h1>해치워</h1>
  <div class="font-ctrl">
    <button id="font-down" title="글자 작게">−</button>
    <span id="font-label">100%</span>
    <button id="font-up" title="글자 크게">+</button>
  </div>
  <button class="history-btn" id="history-btn">히스토리</button>
  <div class="user-info">
    <img id="user-avatar" src="" alt="">
    <span id="user-name"></span>
    <button class="btn-logout" id="btn-logout">로그아웃</button>
  </div>
</header>

<!-- 히스토리 모달 -->
<div class="modal-overlay" id="history-modal">
  <div class="modal">
    <div class="modal-header">
      <h2>📋 완료 히스토리</h2>
      <button class="modal-close" id="modal-close">×</button>
    </div>
    <div class="modal-body" id="history-body"></div>
  </div>
</div>

<main>
  <!-- 할 일 컬럼 -->
  <div class="col" id="col-todo">
    <div class="col-header">
      <h2>할 일</h2>
      <span class="count-badge" id="badge-todo">0</span>
    </div>
    <div class="add-bar">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" stroke="#8ab4f8" stroke-width="2"/>
        <path d="M12 8v8M8 12h8" stroke="#8ab4f8" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <input type="text" id="new-task-input" placeholder="할 일 추가" autocomplete="off">
      <button id="add-btn" title="추가">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24">
          <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="task-list" id="list-todo"
         data-empty="할 일이 없습니다 🎉"
         ondragover="onDragOver(event,'todo')"
         ondrop="onDrop(event,'todo')"></div>
  </div>

  <!-- 완료 컬럼 -->
  <div class="col" id="col-done">
    <div class="col-header">
      <h2>완료</h2>
      <span class="count-badge" id="badge-done">0</span>
    </div>
    <div class="task-list" id="list-done"
         data-empty="완료된 항목이 없습니다"
         ondragover="onDragOver(event,'done')"
         ondrop="onDrop(event,'done')"></div>
    <button class="clear-done-btn" id="clear-done-btn" onclick="clearDone()">
      완료 항목 모두 삭제
    </button>
  </div>
</main>
</div><!-- /app-screen -->

<script>
// ── 상태 ──
let tasks = [];
let editingId = null, dragSrcId = null;

// Firestore에서 실시간으로 받아 렌더링
window._renderFromFirestore = function() {
  tasks = window._tasks || [];
  render();
};

function save() { /* Firestore가 실시간 동기화하므로 별도 저장 불필요 */ }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

// ── 렌더링 ──
const ONE_DAY = 86400000;
function render() {
  const now = Date.now();
  const todo     = tasks.filter(t => !t.done);
  const done     = tasks.filter(t => t.done && (now - (t.completedAt || 0)) < ONE_DAY);
  const archived = tasks.filter(t => t.done && (now - (t.completedAt || 0)) >= ONE_DAY);
  document.getElementById('badge-todo').textContent = todo.length;
  document.getElementById('badge-done').textContent = done.length;
  document.getElementById('clear-done-btn').classList.toggle('visible', done.length > 0);
  document.getElementById('history-btn').textContent = archived.length > 0 ? `히스토리 (${archived.length})` : '히스토리';
  renderList('list-todo', todo);
  renderList('list-done', done);
}

function renderList(id, items) {
  const el = document.getElementById(id);
  el.innerHTML = '';
  items.forEach(t => el.appendChild(mkEl(t)));
}

function mkEl(t) {
  const div = document.createElement('div');
  div.className = 'task-item' + (t.done ? ' done' : '');
  div.dataset.id = t._docId;
  div.draggable = true;
  div.addEventListener('dragstart', e => onDragStart(e, t._docId));
  div.addEventListener('dragend', onDragEnd);
  div.addEventListener('dragover', e => { e.preventDefault(); div.classList.add('drag-over'); });
  div.addEventListener('dragleave', () => div.classList.remove('drag-over'));

  const handle = document.createElement('div');
  handle.className = 'drag-handle';
  handle.innerHTML = `<svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24">
    <circle cx="9" cy="6" r="1.5"/><circle cx="15" cy="6" r="1.5"/>
    <circle cx="9" cy="12" r="1.5"/><circle cx="15" cy="12" r="1.5"/>
    <circle cx="9" cy="18" r="1.5"/><circle cx="15" cy="18" r="1.5"/></svg>`;

  const check = document.createElement('div');
  check.className = 'task-check';
  check.innerHTML = `<svg width="12" height="12" fill="none" viewBox="0 0 12 12">
    <path d="M2 6l3 3 5-5" stroke="#202124" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  check.addEventListener('click', () => toggleDone(t._docId));

  if (editingId === t._docId) {
    const body = document.createElement('div');
    body.className = 'task-body';
    const ti = document.createElement('textarea');
    ti.className = 'task-edit-title'; ti.rows = 2; ti.value = t.title;
    ti.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveEdit(t._docId, ti, ni, di); }
      if (e.key === 'Escape') cancelEdit();
    });
    const ni = document.createElement('textarea');
    ni.className = 'task-edit-note'; ni.placeholder = '메모 추가'; ni.value = t.note || '';
    const di = document.createElement('input');
    di.type = 'date'; di.className = 'task-edit-due'; di.value = t.due || '';
    const acts = document.createElement('div'); acts.className = 'edit-actions';
    const sb = document.createElement('button'); sb.className = 'btn-save'; sb.textContent = '저장';
    sb.onclick = () => saveEdit(t._docId, ti, ni, di);
    const cb = document.createElement('button'); cb.className = 'btn-cancel-edit'; cb.textContent = '취소';
    cb.onclick = cancelEdit;
    acts.append(sb, cb); body.append(ti, ni, di, acts);
    div.append(handle, check, body);
    setTimeout(() => { ti.focus(); ti.select(); }, 0);
  } else {
    const body = document.createElement('div'); body.className = 'task-body';
    const te = document.createElement('div'); te.className = 'task-title'; te.textContent = t.title;
    body.appendChild(te);
    if (t.note) {
      const ne = document.createElement('div'); ne.className = 'task-note'; ne.textContent = t.note;
      body.appendChild(ne);
    }
    if (t.due) {
      const de = document.createElement('div');
      const today = new Date().toISOString().slice(0, 10);
      de.className = 'task-due' + (t.due < today && !t.done ? ' overdue' : '');
      de.innerHTML = `<svg width="12" height="12" fill="none" viewBox="0 0 24 24">
        <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/>
        <path d="M16 2v4M8 2v4M3 10h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>` + fmtDate(t.due);
      body.appendChild(de);
    }
    const acts = document.createElement('div'); acts.className = 'task-actions';
    const eb = document.createElement('button'); eb.title = '수정';
    eb.innerHTML = `<svg width="15" height="15" fill="none" viewBox="0 0 24 24">
      <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    eb.onclick = e => { e.stopPropagation(); startEdit(t._docId); };
    const db = document.createElement('button'); db.className = 'btn-delete'; db.title = '삭제';
    db.innerHTML = `<svg width="15" height="15" fill="none" viewBox="0 0 24 24">
      <polyline points="3 6 5 6 21 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M19 6l-1 14H6L5 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M10 11v6M14 11v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M9 6V4h6v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    db.onclick = e => { e.stopPropagation(); deleteTask(t._docId); };
    acts.append(eb, db); div.append(handle, check, body, acts);
  }
  return div;
}

function fmtDate(d) {
  if (!d) return '';
  const [y, m, day] = d.split('-');
  return `${y}년 ${parseInt(m)}월 ${parseInt(day)}일`;
}

async function addTask(title) {
  title = title.trim(); if (!title) return;
  if (!window._firestoreReady) { alert('Firebase 연결 중입니다. 잠시 후 다시 시도해주세요.'); return; }
  await window._addDoc(window._col(), { title, note: '', due: '', done: false, createdAt: Date.now() });
}
async function toggleDone(id) {
  const t = tasks.find(t => t._docId === id); if (!t) return;
  const update = { done: !t.done };
  if (!t.done) update.completedAt = Date.now(); else update.completedAt = null;
  await window._updateDoc(window._doc(id), update);
}
async function deleteTask(id) {
  if (editingId === id) editingId = null;
  await window._deleteDoc(window._doc(id));
}
async function clearDone() {
  if (!confirm('완료된 항목을 모두 삭제하시겠습니까?')) return;
  const dones = tasks.filter(t => t.done);
  await Promise.all(dones.map(t => window._deleteDoc(window._doc(t._docId))));
}
function startEdit(id) { editingId = id; render(); }
function cancelEdit() { editingId = null; render(); }
async function saveEdit(id, ti, ni, di) {
  const title = ti.value.trim(); if (!title) return;
  editingId = null;
  render();
  await window._updateDoc(window._doc(id), { title, note: ni.value.trim(), due: di.value || '' });
}

function onDragStart(e, id) {
  dragSrcId = id;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.task-item').forEach(el => el.classList.remove('drag-over'));
}
function onDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
async function onDrop(e, listType) {
  e.preventDefault();
  document.querySelectorAll('.task-item').forEach(el => el.classList.remove('drag-over'));
  if (!dragSrcId) return;
  const src = tasks.find(t => t._docId === dragSrcId); if (!src) return;

  // 완료 상태 자동 전환
  if (listType === 'done' && !src.done) {
    await window._updateDoc(window._doc(dragSrcId), { done: true, completedAt: Date.now() });
  } else if (listType === 'todo' && src.done) {
    await window._updateDoc(window._doc(dragSrcId), { done: false, completedAt: null });
  }
  dragSrcId = null;
}

document.getElementById('new-task-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { addTask(e.target.value); e.target.value = ''; }
});
document.getElementById('add-btn').addEventListener('click', () => {
  const inp = document.getElementById('new-task-input');
  addTask(inp.value); inp.value = '';
});
document.addEventListener('click', e => {
  if (editingId && !e.target.closest('.task-item')) cancelEdit();
});

// ── 로그인 UI ──
let isSignup = false;
document.getElementById('btn-google').addEventListener('click', async () => {
  try { await window._loginGoogle(); }
  catch(e) { document.getElementById('login-error').textContent = '구글 로그인에 실패했습니다.'; }
});
document.getElementById('switch-link').addEventListener('click', () => {
  isSignup = !isSignup;
  document.getElementById('btn-email-action').textContent = isSignup ? '회원가입' : '로그인';
  document.getElementById('login-switch').innerHTML = isSignup
    ? '이미 계정이 있으신가요? <span id="switch-link">로그인</span>'
    : '계정이 없으신가요? <span id="switch-link">회원가입</span>';
  document.getElementById('switch-link').addEventListener('click', arguments.callee);
  document.getElementById('login-error').textContent = '';
});
document.getElementById('btn-email-action').addEventListener('click', async () => {
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-pw').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  if (!email || !pw) { errEl.textContent = '이메일과 비밀번호를 입력해주세요.'; return; }
  try {
    if (isSignup) await window._signupEmail(email, pw);
    else await window._loginEmail(email, pw);
  } catch(e) {
    const msg = {
      'auth/user-not-found': '등록되지 않은 이메일입니다.',
      'auth/wrong-password': '비밀번호가 틀렸습니다.',
      'auth/email-already-in-use': '이미 사용 중인 이메일입니다.',
      'auth/weak-password': '비밀번호는 6자리 이상이어야 합니다.',
      'auth/invalid-email': '올바른 이메일 형식이 아닙니다.',
      'auth/invalid-credential': '이메일 또는 비밀번호가 올바르지 않습니다.',
    };
    errEl.textContent = msg[e.code] || '로그인에 실패했습니다.';
  }
});
document.getElementById('login-email').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('login-pw').focus(); });
document.getElementById('login-pw').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('btn-email-action').click(); });
document.getElementById('btn-logout').addEventListener('click', () => window._logout());

// ── 히스토리 모달 ──
function openHistory() {
  const now = Date.now();
  const archived = tasks
    .filter(t => t.done && (now - (t.completedAt || 0)) >= ONE_DAY)
    .sort((a, b) => (b.completedAt || 0) - (a.completedAt || 0));

  const body = document.getElementById('history-body');
  body.innerHTML = '';

  if (archived.length === 0) {
    body.innerHTML = '<div class="history-empty">보관된 항목이 없습니다</div>';
  } else {
    // 날짜별 그룹
    const groups = {};
    archived.forEach(t => {
      const d = new Date(t.completedAt || 0);
      const key = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
      const label = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
      if (!groups[key]) groups[key] = { label, items: [] };
      groups[key].items.push(t);
    });
    Object.values(groups).forEach(g => {
      const grp = document.createElement('div');
      grp.className = 'hist-group';
      const dateEl = document.createElement('div');
      dateEl.className = 'hist-date';
      dateEl.textContent = g.label;
      grp.appendChild(dateEl);
      g.items.forEach(t => {
        const row = document.createElement('div');
        row.className = 'hist-item';
        const d = new Date(t.completedAt || 0);
        const time = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')} 완료`;
        row.innerHTML = `
          <div class="hist-check"><svg width="11" height="11" fill="none" viewBox="0 0 12 12"><path d="M2 6l3 3 5-5" stroke="#202124" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <div class="hist-body">
            <div class="hist-title">${t.title}</div>
            ${t.note ? `<div class="hist-note">${t.note}</div>` : ''}
            <div class="hist-time">${time}</div>
          </div>`;
        grp.appendChild(row);
      });
      body.appendChild(grp);
    });
  }
  document.getElementById('history-modal').classList.add('open');
}

document.getElementById('history-btn').addEventListener('click', openHistory);
document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('history-modal').classList.remove('open');
});
document.getElementById('history-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});

// ── 글자 크기 조절 ──
const FONT_SIZES = [0.75, 0.85, 1, 1.15, 1.3]; // rem 단위 (1 = 디폴트 100%)
const FONT_LABELS = ['75%', '85%', '100%', '115%', '130%'];
let fontIdx = parseInt(localStorage.getItem('mytasks_fontIdx') ?? '2');

function applyFont() {
  document.documentElement.style.setProperty('--fs', FONT_SIZES[fontIdx] + 'rem');
  document.getElementById('font-label').textContent = FONT_LABELS[fontIdx];
  document.getElementById('font-down').disabled = fontIdx === 0;
  document.getElementById('font-up').disabled = fontIdx === FONT_SIZES.length - 1;
  localStorage.setItem('mytasks_fontIdx', fontIdx);
}
document.getElementById('font-up').addEventListener('click', () => { if (fontIdx < FONT_SIZES.length - 1) { fontIdx++; applyFont(); } });
document.getElementById('font-down').addEventListener('click', () => { if (fontIdx > 0) { fontIdx--; applyFont(); } });
applyFont();

// Firebase 로딩 전 초기 렌더 (빈 상태)
render();
</script>
</body>
</html>
